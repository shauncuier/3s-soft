  <script>
    (function () {
      var isLocalhost =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      if (!isLocalhost || !('serviceWorker' in navigator) || !window.sessionStorage) {
        return;
      }

      var resetKey = '3s-soft-local-sw-reset';

      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        if (!registrations.length) {
          window.sessionStorage.removeItem(resetKey);
          return;
        }

        if (window.sessionStorage.getItem(resetKey) === 'done') {
          return;
        }

        window.sessionStorage.setItem(resetKey, 'done');

        Promise.all(
          registrations.map(function (registration) {
            return registration.unregister();
          })
        )
          .then(function () {
            if (!('caches' in window)) {
              return;
            }

            return window.caches.keys().then(function (keys) {
              return Promise.all(
                keys.map(function (key) {
                  return window.caches.delete(key);
                })
              );
            });
          })
          .finally(function () {
            window.location.reload();
          });
      });
    })();
